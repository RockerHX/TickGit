name: Release
run-name: Release v1.6.2

on:
  push:
    branches:
      - main

concurrency:
  group: release-${{ github.workflow }}-${{ github.sha }}
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  validate-release:
    name: Validate release tag
    runs-on: ubuntu-22.04
    outputs:
      should_release: ${{ steps.meta.outputs.should_release }}
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      release_notes: ${{ steps.meta.outputs.release_notes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Resolve release tag and validate versions
        id: meta
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          TAG_NAME=""
          TAG_SHA=""

          fetch_release_refs() {
            git fetch origin \
              '+refs/heads/main:refs/remotes/origin/main' \
              '+refs/tags/*:refs/tags/*' \
              --force
          }

          skip_release() {
            local reason="$1"
            echo "${reason}"
            {
              echo "should_release=false"
              echo "tag_name=${TAG_NAME}"
              echo "release_name=${TAG_NAME:-No release}"
              echo "release_notes=${reason}"
            } >> "${GITHUB_OUTPUT}"
            exit 0
          }

          release_exists() {
            gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1
          }

          require_release_tag() {
            TAG_NAME="${TAG_NAME#refs/tags/}"

            if [[ -z "${TAG_NAME}" ]]; then
              echo "Release tag name is empty." >&2
              exit 1
            fi

            if [[ "${TAG_NAME}" != v* ]]; then
              echo "Release tag ${TAG_NAME} must start with v." >&2
              exit 1
            fi

            if ! git rev-parse -q --verify "refs/tags/${TAG_NAME}^{commit}" >/dev/null; then
              echo "Release tag ${TAG_NAME} does not exist." >&2
              exit 1
            fi

            TAG_SHA="$(git rev-parse "refs/tags/${TAG_NAME}^{commit}")"
          }

          fetch_release_refs

          if [[ "${GITHUB_REF_TYPE}" == "branch" && "${GITHUB_REF_NAME}" == "main" ]]; then
            PACKAGE_VERSION="$(node -p "require('./package.json').version")"
            TAG_NAME="v${PACKAGE_VERSION}"

            if ! git rev-parse -q --verify "refs/tags/${TAG_NAME}^{commit}" >/dev/null; then
              skip_release "Skipped release build because main expects ${TAG_NAME}, but that tag does not exist."
            fi

            require_release_tag

            if ! git merge-base --is-ancestor "${TAG_SHA}" HEAD; then
              skip_release "Skipped release build because ${TAG_NAME} is not reachable from the pushed main commit."
            fi

            if release_exists; then
              skip_release "Skipped release build because GitHub Release ${TAG_NAME} already exists."
            fi
          else
            skip_release "Skipped release build for unsupported ref ${GITHUB_REF}."
          fi

          # Build and publish the exact tagged commit, not the merge commit that happened to trigger this workflow.
          git checkout --detach "${TAG_SHA}"

          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAURI_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          CARGO_VERSION="$(awk '
            /^\[package\]$/ { in_package = 1; next }
            /^\[/ && in_package { exit }
            in_package && /^version = "/ {
              gsub(/^version = "/, "", $0)
              gsub(/"$/, "", $0)
              print
              exit
            }
          ' src-tauri/Cargo.toml)"
          EXPECTED_TAG="v${PACKAGE_VERSION}"

          if [[ -z "${CARGO_VERSION}" ]]; then
            echo "Unable to read version from src-tauri/Cargo.toml." >&2
            exit 1
          fi

          if [[ "${PACKAGE_VERSION}" != "${TAURI_VERSION}" || "${PACKAGE_VERSION}" != "${CARGO_VERSION}" ]]; then
            echo "Version mismatch detected:" >&2
            echo "package.json=${PACKAGE_VERSION}" >&2
            echo "src-tauri/tauri.conf.json=${TAURI_VERSION}" >&2
            echo "src-tauri/Cargo.toml=${CARGO_VERSION}" >&2
            exit 1
          fi

          if [[ "${TAG_NAME}" != "${EXPECTED_TAG}" ]]; then
            echo "Tag ${TAG_NAME} does not match project version ${EXPECTED_TAG}." >&2
            exit 1
          fi

          {
            echo "should_release=true"
            echo "tag_name=${TAG_NAME}"
            echo "release_name=${TAG_NAME}"
            echo "release_notes=Automated release for ${TAG_NAME}"
          } >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.platform.label }}
    needs: validate-release
    if: needs.validate-release.outputs.should_release == 'true'
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - label: windows-x64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            tauri-args: --target x86_64-pc-windows-msvc
          - label: windows-arm64
            os: windows-latest
            rust-target: aarch64-pc-windows-msvc
            tauri-args: --target aarch64-pc-windows-msvc
          - label: macos-dmg
            os: macos-latest
            rust-target: ""
            tauri-args: ""
          - label: linux-bundles
            os: ubuntu-22.04
            rust-target: ""
            tauri-args: ""
    steps:
      - name: Checkout release tag
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate-release.outputs.tag_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: pnpm

      - name: Install Rust stable
        if: matrix.platform.rust-target == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust stable with target
        if: matrix.platform.rust-target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust-target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            rpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build Tauri bundles
        run: pnpm tauri build ${{ matrix.platform.tauri-args }}

      - name: Collect release assets
        id: collect
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-assets

          if [[ -n "${{ matrix.platform.rust-target }}" ]]; then
            bundle_root="src-tauri/target/${{ matrix.platform.rust-target }}/release/bundle"
          else
            bundle_root="src-tauri/target/release/bundle"
          fi

          files=()
          while IFS= read -r -d '' file; do
            case "${file}" in
              "${bundle_root}/nsis/"*.exe|\
              "${bundle_root}/nsis/"*.msi|\
              "${bundle_root}/dmg/"*.dmg|\
              "${bundle_root}/deb/"*.deb|\
              "${bundle_root}/rpm/"*.rpm|\
              *.sig)
                files+=("${file}")
                ;;
            esac
          done < <(find "${bundle_root}" -type f -print0)

          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release assets found under ${bundle_root}." >&2
            exit 1
          fi

          for file in "${files[@]}"; do
            cp "${file}" release-assets/
          done

      - name: Upload bundled artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform.label }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish release
    needs:
      - validate-release
      - build
    if: needs.validate-release.outputs.should_release == 'true'
    runs-on: ubuntu-22.04
    steps:
      - name: Download all bundled artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist-artifacts

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${{ needs.validate-release.outputs.tag_name }}"
          RELEASE_NAME="${{ needs.validate-release.outputs.release_name }}"
          RELEASE_NOTES="${{ needs.validate-release.outputs.release_notes }}"

          mapfile -d '' FILES < <(find dist-artifacts -type f -print0 | sort -z)

          if [[ ${#FILES[@]} -eq 0 ]]; then
            echo "No artifacts downloaded for release ${TAG_NAME}." >&2
            exit 1
          fi

          if gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" --title "${RELEASE_NAME}" --notes "${RELEASE_NOTES}"
          else
            gh release create "${TAG_NAME}" "${FILES[@]}" --repo "${GITHUB_REPOSITORY}" --title "${RELEASE_NAME}" --notes "${RELEASE_NOTES}"
            exit 0
          fi

          gh release upload "${TAG_NAME}" "${FILES[@]}" --repo "${GITHUB_REPOSITORY}" --clobber
