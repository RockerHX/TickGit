name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  validate-release:
    name: Validate release tag
    runs-on: ubuntu-22.04
    outputs:
      tag_name: ${{ steps.meta.outputs.tag_name }}
      release_name: ${{ steps.meta.outputs.release_name }}
      release_notes: ${{ steps.meta.outputs.release_notes }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Validate tag target and versions
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          git fetch origin main --tags --force

          TAG_NAME="${GITHUB_REF_NAME}"
          TAG_SHA="${GITHUB_SHA}"

          if ! git branch -r --contains "${TAG_SHA}" | grep -q "origin/main"; then
            echo "Tag ${TAG_NAME} does not point to a commit reachable from origin/main." >&2
            exit 1
          fi

          PACKAGE_VERSION="$(node -p "require('./package.json').version")"
          TAURI_VERSION="$(node -p "require('./src-tauri/tauri.conf.json').version")"
          CARGO_VERSION="$(sed -n '0,/^version = \"\\([^\"]*\\)\"/s//\\1/p' src-tauri/Cargo.toml)"
          EXPECTED_TAG="v${PACKAGE_VERSION}"

          if [[ -z "${CARGO_VERSION}" ]]; then
            echo "Unable to read version from src-tauri/Cargo.toml." >&2
            exit 1
          fi

          if [[ "${PACKAGE_VERSION}" != "${TAURI_VERSION}" || "${PACKAGE_VERSION}" != "${CARGO_VERSION}" ]]; then
            echo "Version mismatch detected:" >&2
            echo "package.json=${PACKAGE_VERSION}" >&2
            echo "src-tauri/tauri.conf.json=${TAURI_VERSION}" >&2
            echo "src-tauri/Cargo.toml=${CARGO_VERSION}" >&2
            exit 1
          fi

          if [[ "${TAG_NAME}" != "${EXPECTED_TAG}" ]]; then
            echo "Tag ${TAG_NAME} does not match project version ${EXPECTED_TAG}." >&2
            exit 1
          fi

          {
            echo "tag_name=${TAG_NAME}"
            echo "release_name=${TAG_NAME}"
            echo "release_notes=Automated release for ${TAG_NAME}"
          } >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.platform.label }}
    needs: validate-release
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - label: windows-x64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            tauri-args: --target x86_64-pc-windows-msvc
          - label: windows-arm64
            os: windows-latest
            rust-target: aarch64-pc-windows-msvc
            tauri-args: --target aarch64-pc-windows-msvc
          - label: macos-dmg
            os: macos-latest
            rust-target: ''
            tauri-args: ''
          - label: linux-bundles
            os: ubuntu-22.04
            rust-target: ''
            tauri-args: ''
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        if: matrix.platform.rust-target == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust stable with target
        if: matrix.platform.rust-target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust-target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            rpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build Tauri bundles
        run: pnpm tauri build ${{ matrix.platform.tauri-args }}

      - name: Collect release assets
        id: collect
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-assets
          shopt -s globstar nullglob

          if [[ -n "${{ matrix.platform.rust-target }}" ]]; then
            bundle_root="src-tauri/target/${{ matrix.platform.rust-target }}/release/bundle"
          else
            bundle_root="src-tauri/target/release/bundle"
          fi

          files=()
          for pattern in \
            "${bundle_root}/nsis/"*.exe \
            "${bundle_root}/nsis/"*.msi \
            "${bundle_root}/dmg/"*.dmg \
            "${bundle_root}/deb/"*.deb \
            "${bundle_root}/rpm/"*.rpm \
            "${bundle_root}/**/"*.sig; do
            for file in ${pattern}; do
              [[ -f "${file}" ]] || continue
              files+=("${file}")
            done
          done

          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release assets found under ${bundle_root}." >&2
            exit 1
          fi

          for file in "${files[@]}"; do
            cp "${file}" release-assets/
          done

      - name: Upload bundled artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform.label }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish release
    needs:
      - validate-release
      - build
    runs-on: ubuntu-22.04
    steps:
      - name: Download all bundled artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist-artifacts

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${{ needs.validate-release.outputs.tag_name }}"
          RELEASE_NAME="${{ needs.validate-release.outputs.release_name }}"
          RELEASE_NOTES="${{ needs.validate-release.outputs.release_notes }}"

          mapfile -d '' FILES < <(find dist-artifacts -type f -print0 | sort -z)

          if [[ ${#FILES[@]} -eq 0 ]]; then
            echo "No artifacts downloaded for release ${TAG_NAME}." >&2
            exit 1
          fi

          if gh release view "${TAG_NAME}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" --title "${RELEASE_NAME}" --notes "${RELEASE_NOTES}"
          else
            gh release create "${TAG_NAME}" "${FILES[@]}" --title "${RELEASE_NAME}" --notes "${RELEASE_NOTES}"
            exit 0
          fi

          gh release upload "${TAG_NAME}" "${FILES[@]}" --clobber
