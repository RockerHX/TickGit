name: Manual Package

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Branch, tag, or SHA to package
        required: true
        default: main
        type: string
      version_suffix:
        description: Optional suffix for the prerelease tag/name
        required: false
        default: ''
        type: string

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare prerelease metadata
    runs-on: ubuntu-22.04
    outputs:
      ref_name: ${{ steps.meta.outputs.ref_name }}
      release_tag: ${{ steps.meta.outputs.release_tag }}
      release_name: ${{ steps.meta.outputs.release_name }}
      release_notes: ${{ steps.meta.outputs.release_notes }}
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref }}
          fetch-depth: 0

      - name: Build prerelease metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          REF_NAME="${{ inputs.ref }}"
          SHORT_SHA="$(git rev-parse --short=8 HEAD)"
          RAW_SUFFIX="${{ inputs.version_suffix }}"

          if [[ -n "${RAW_SUFFIX}" ]]; then
            SUFFIX="${RAW_SUFFIX}"
          else
            SUFFIX="${SHORT_SHA}"
          fi

          SAFE_REF="$(printf '%s' "${REF_NAME}" | tr '/:@ ' '-')"
          SAFE_SUFFIX="$(printf '%s' "${SUFFIX}" | tr '/:@ ' '-')"
          RELEASE_TAG="manual-${SAFE_REF}-${SAFE_SUFFIX}"
          RELEASE_NAME="Manual package ${SAFE_REF} ${SAFE_SUFFIX}"

          {
            echo "ref_name=${REF_NAME}"
            echo "release_tag=${RELEASE_TAG}"
            echo "release_name=${RELEASE_NAME}"
            echo "release_notes=Manual prerelease build from ${REF_NAME} at ${SHORT_SHA}"
          } >> "${GITHUB_OUTPUT}"

  build:
    name: Build ${{ matrix.platform.label }}
    needs: prepare
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - label: windows-x64
            os: windows-latest
            rust-target: x86_64-pc-windows-msvc
            tauri-args: --target x86_64-pc-windows-msvc
          - label: windows-arm64
            os: windows-latest
            rust-target: aarch64-pc-windows-msvc
            tauri-args: --target aarch64-pc-windows-msvc
          - label: macos-dmg
            os: macos-latest
            rust-target: ''
            tauri-args: ''
          - label: linux-bundles
            os: ubuntu-22.04
            rust-target: ''
            tauri-args: ''
    steps:
      - name: Checkout target ref
        uses: actions/checkout@v6
        with:
          ref: ${{ needs.prepare.outputs.ref_name }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install Rust stable
        if: matrix.platform.rust-target == ''
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust stable with target
        if: matrix.platform.rust-target != ''
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rust-target }}

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            librsvg2-dev \
            libayatana-appindicator3-dev \
            patchelf \
            rpm

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Build Tauri bundles
        run: pnpm tauri build ${{ matrix.platform.tauri-args }}

      - name: Collect release assets
        id: collect
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p release-assets

          if [[ -n "${{ matrix.platform.rust-target }}" ]]; then
            bundle_root="src-tauri/target/${{ matrix.platform.rust-target }}/release/bundle"
          else
            bundle_root="src-tauri/target/release/bundle"
          fi

          files=()
          while IFS= read -r -d '' file; do
            case "${file}" in
              "${bundle_root}/nsis/"*.exe|\
              "${bundle_root}/nsis/"*.msi|\
              "${bundle_root}/dmg/"*.dmg|\
              "${bundle_root}/deb/"*.deb|\
              "${bundle_root}/rpm/"*.rpm|\
              *.sig)
                files+=("${file}")
                ;;
            esac
          done < <(find "${bundle_root}" -type f -print0)

          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release assets found under ${bundle_root}." >&2
            exit 1
          fi

          for file in "${files[@]}"; do
            cp "${file}" release-assets/
          done

      - name: Upload bundled artifacts
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.platform.label }}
          path: release-assets/*
          if-no-files-found: error

  publish:
    name: Publish prerelease
    needs:
      - prepare
      - build
    runs-on: ubuntu-22.04
    steps:
      - name: Download all bundled artifacts
        uses: actions/download-artifact@v8
        with:
          path: dist-artifacts

      - name: Create or update prerelease
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail

          TAG_NAME="${{ needs.prepare.outputs.release_tag }}"
          RELEASE_NAME="${{ needs.prepare.outputs.release_name }}"
          RELEASE_NOTES="${{ needs.prepare.outputs.release_notes }}"

          mapfile -d '' FILES < <(find dist-artifacts -type f -print0 | sort -z)

          if [[ ${#FILES[@]} -eq 0 ]]; then
            echo "No artifacts downloaded for prerelease ${TAG_NAME}." >&2
            exit 1
          fi

          if gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            gh release edit "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}" --title "${RELEASE_NAME}" --notes "${RELEASE_NOTES}" --prerelease
          else
            gh release create "${TAG_NAME}" "${FILES[@]}" --repo "${GITHUB_REPOSITORY}" --title "${RELEASE_NAME}" --notes "${RELEASE_NOTES}" --prerelease
            exit 0
          fi

          gh release upload "${TAG_NAME}" "${FILES[@]}" --repo "${GITHUB_REPOSITORY}" --clobber
